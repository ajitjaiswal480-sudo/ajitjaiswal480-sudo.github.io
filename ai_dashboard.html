<div class="matrix-card" style="margin-top: 25px; padding: 20px; background: rgba(16, 22, 36, 0.7); border: 1px solid rgba(0, 198, 255, 0.2); border-radius: 12px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); backdrop-filter: blur(4px); transition: 0.3s; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">
        <h3 style="margin: 0; font-size: 1.1rem; color: #e2e8f0; display: flex; align-items: center; gap: 8px;">
            🤖 [File 06] AI Video Agent Copilot Studio
        </h3>
        <span style="font-size: 0.75rem; background: rgba(0, 198, 255, 0.1); color: #00c6ff; padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0, 198, 255, 0.2);">
            Agent 2.0 Engine Active
        </span>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label style="display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 8px;">
                Enter Multi-Stage Core Direction
            </label>
            <textarea id="agentInput" style="width: 100%; height: 100px; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; padding: 10px; font-size: 0.9rem; resize: none; box-sizing: border-box; margin-bottom: 15px;" placeholder="Describe character look, scene progression, and final transition vectors..."></textarea>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px;">Select Copilot Mode</label>
                <select id="agentMode" style="width: 100%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 6px; font-size: 0.85rem;">
                    <option value="pixar">Cinematic Pixar/DreamWorks Style</option>
                    <option value="hyper">Hyper-Realistic Cyberpunk VFX</option>
                    <option value="anime">Studio Ghibli 2D Anime Render</option>
                </select>
            </div>

            <button onclick="compileAgentSequencing()" style="width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); border: none; color: white; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; letter-spacing: 0.05em;">
                COMPILE AGENT REACTION LAYERS
            </button>
        </div>

        <div style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span style="font-size: 0.75rem; font-weight: bold; color: #ff007f; letter-spacing: 0.05em; text-transform: uppercase;">
                        File 06 Terminal
                    </span>
                    <button onclick="copyAgentTerminal()" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: 0.2s;">
                        Copy
                    </button>
                </div>
                <div id="agentTerminal" style="font-family: 'Courier New', Courier, monospace; font-size: 0.85rem; color: #38bdf8; line-height: 1.5; white-space: pre-wrap; max-height: 160px; overflow-y: auto; padding-right: 5px;">Awaiting agent computation directives...</div>
            </div>
            
            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.75rem; color: #64748b;">Copilot Guidance: Step 1 of 3</span>
                <span style="font-size: 0.75rem; color: #4ade80; display: flex; align-items: center; gap: 4px;">● Ready</span>
            </div>
        </div>
    </div>
</div>

<script>
function compileAgentSequencing() {
    const input = document.getElementById('agentInput').value || "Surprised character look";
    const mode = document.getElementById('agentMode').value;
    const terminal = document.getElementById('agentTerminal');
    
    terminal.innerHTML = "⚡ Initializing Agent 2.0 Matrix Execution...\n";
    
    setTimeout(() => {
        let output = `🤖 AGENT 2.0 COMPILER SEQUENCE DIRECTIVES:\n==========================================\n`;
        output += `1. CHARACTER REF: Highly detailed ${mode === 'pixar' ? '3D Pixar style cinematic character' : mode === 'hyper' ? 'Hyper-realistic cinematic asset' : '2D animated anime focus'}.\n`;
        output += `2. MULTI-STAGE STEP: Lock initial composition still frame -> Inject fluid motion timeline vector.\n`;
        output += `3. ANIMATION PARAMS: Shifting expression instantly from neutral to wide-eyed astonishment based on source context: "${input}" --motion 7 --cfg 12`;
        
        terminal.innerHTML = output;
        terminal.style.color = "#4ade80";
    }, 800);
}

function copyAgentTerminal() {
    const text = document.getElementById('agentTerminal').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Agent Prompt Copied Successfully!");
    });
}
</script>
