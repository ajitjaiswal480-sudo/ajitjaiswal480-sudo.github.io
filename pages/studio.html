<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Studio - Ajit AI Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6">

  <h1 class="text-4xl font-black text-cyan-400 mb-4">🧠 Ajit AI Studio</h1>
  <p class="text-gray-400 mb-8">Script, caption, thumbnail और video prompt बनाओ.</p>

  <div class="grid md:grid-cols-3 gap-5 mb-8">
    <button onclick="setTool('script')" class="bg-cyan-400 text-black p-4 rounded-xl font-bold">✍️ Script Writer</button>
    <button onclick="setTool('video')" class="bg-purple-500 text-black p-4 rounded-xl font-bold">🎬 Video Prompt</button>
    <button onclick="setTool('thumb')" class="bg-pink-500 text-black p-4 rounded-xl font-bold">🖼️ Thumbnail Text</button>
  </div>

  <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
    <h2 id="toolTitle" class="text-2xl font-black mb-4">✍️ Script Writer</h2>

    <textarea id="promptInput" class="w-full h-40 bg-slate-950 border border-slate-700 rounded-xl p-4 outline-none mb-4"
      placeholder="Topic likho... Example: Middle class online shopping comedy"></textarea>

    <button onclick="generateOutput()" class="bg-cyan-400 text-black px-6 py-3 rounded-xl font-black">Generate</button>

    <div class="mt-6 bg-slate-950 p-5 rounded-2xl border border-slate-700">
      <h3 class="font-bold text-cyan-400 mb-3">AI Output</h3>
      <pre id="outputBox" class="whitespace-pre-wrap text-gray-300">Output yahan dikhega...</pre>
    </div>
  </div>

  <div class="mt-8 flex gap-4">
    <a href="dashboard.html" class="bg-slate-700 text-white px-5 py-3 rounded-xl font-bold">Back Dashboard</a>
    <a href="../index.html" class="bg-slate-700 text-white px-5 py-3 rounded-xl font-bold">Home</a>
  </div>

  <script src="js/studio.js"></script>
</body>
</html>
